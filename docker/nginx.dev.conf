events {}

http {
    include /etc/nginx/mime.types;

    # ── Dev Server ──
    server {
        listen 8080;
    resolver 127.0.0.11 valid=10s;

        # I18N
        location /api/i18n {
            proxy_pass http://ai-shifu-cook-web-dev:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Config
        location /api/config {
            proxy_pass http://ai-shifu-cook-web-dev:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API
        location /api/ {
            proxy_pass http://ai-shifu-api-dev:5800;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Frontend
        location /_next/ { 
            proxy_pass http://ai-shifu-cook-web-dev:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Login
        location = /login { rewrite ^/login$ /login.html break; root /usr/share/nginx/html; }
        location = /login.html { root /usr/share/nginx/html; }

        # Static H5 pages
        location = /training-portal.html { root /usr/share/nginx/html; }
        location = /video-player.html { root /usr/share/nginx/html; }
        location = /video-manager.html { root /usr/share/nginx/html; }
        location = /courses.html { root /usr/share/nginx/html; }
        location = /logout.html { root /usr/share/nginx/html; }
        location = /logout { rewrite ^ /logout.html break; root /usr/share/nginx/html; }
        location = /logo.png { root /usr/share/nginx/html; }
        location = /feature-overview.html { root /usr/share/nginx/html; }
        location = /feature-slides.html { root /usr/share/nginx/html; }
        location = /favicon.svg { root /usr/share/nginx/html; }
        location = /d3.v7.min.js { root /usr/share/nginx/html; }
        location = /coach.html { root /usr/share/nginx/html; }
        location = /mentor { rewrite ^ /coach permanent; }
        location = /mentor.html { rewrite ^ /coach permanent; }
        location ~ ^/coach(/.*)?$ {
            rewrite ^/coach/?$ /coach.html break;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /coach.html;
        }

        # Additional static H5 pages
        location = /sysmex-login.html { root /usr/share/nginx/html; }
        location = /course-entry.html { root /usr/share/nginx/html; }
        location = /admin-training-enroll.html { root /usr/share/nginx/html; }
        location = /personal-growth-tree.html { root /usr/share/nginx/html; }
        location = /ivd-knowledge-tree.html { root /usr/share/nginx/html; }
        location = /ivd-sandbox-dashboard.html { root /usr/share/nginx/html; }
        location = /ivd-sandbox-model-docs.html { root /usr/share/nginx/html; }

        # AI Chat proxy (knowledge graph AI)
        location /api/chat/ {
            proxy_pass https://opencode.ai/zen/go/v1/;
            proxy_set_header Host opencode.ai;
            proxy_set_header Authorization "Bearer ${OPENCODE_API_KEY}";
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_buffering off;
            proxy_read_timeout 300s;
            add_header Access-Control-Allow-Origin *;
        }
        # Fallback: Next.js frontend
        # WeChat Work API proxy
        location /wecom/ {
            proxy_pass http://127.0.0.1:8800/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location / {
            proxy_pass http://ai-shifu-cook-web-dev:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
