events {}

http {
    include /etc/nginx/mime.types;

    # ── Dev Server ──
    server {
        listen 8080;

        # I18N
        location /api/i18n {
            proxy_pass http://ai-shifu-cook-web-dev:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Config
        location /api/config {
            proxy_pass http://ai-shifu-cook-web-dev:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API
        location /api/ {
            proxy_pass http://ai-shifu-api-dev:5800;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Frontend
        location /_next/ { proxy_pass http://ai-shifu-cook-web-dev:5000; }

        # Login
        location = /login { rewrite ^/login$ /login.html break; root /usr/share/nginx/html; }
        location = /login.html { root /usr/share/nginx/html; }

        # Static H5 pages
        location = /training-portal.html { root /usr/share/nginx/html; }
        location = /video-player.html { root /usr/share/nginx/html; }
        location = /video-manager.html { root /usr/share/nginx/html; }
        location = /courses.html { root /usr/share/nginx/html; }
        location = /logout.html { root /usr/share/nginx/html; }
        location = /logout { rewrite ^ /logout.html break; root /usr/share/nginx/html; }
        location = /logo.png { root /usr/share/nginx/html; }
        location = /mentor.html { root /usr/share/nginx/html; }
        location ~ ^/mentor(/.*)?$ {
            rewrite ^/mentor/?$ /mentor.html break;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /mentor.html;
        }

        # Fallback: Next.js frontend
        location / {
            proxy_pass http://ai-shifu-cook-web-dev:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
