
server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Proxy course pages to cook-web (so /c/ links work from knowledge graph)
        location /api/chat/ {
        proxy_pass https://opencode.ai/zen/go/v1/;
        proxy_set_header Authorization "Bearer ";
        proxy_set_header Host opencode.ai;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }
    location /c/ {
        proxy_pass http://ai-shifu-cook-web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
