<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>培训管理 - sysmex</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#f5f7fa;color:#1e293b;padding:16px;max-width:960px;margin:0 auto}
h1{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:15px;font-weight:600;margin-bottom:12px;color:#475569}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.form-row select,.form-row input{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;flex:1;min-width:140px;background:#fff}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:#6366f1;color:#fff}
.btn-primary:hover{background:#4f46e5}
.btn-danger{background:#ef4444;color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 6px;border-bottom:2px solid #e2e8f0;color:#64748b;font-weight:600;font-size:11px}
td{padding:8px 6px;border-bottom:1px solid #f1f5f9}
tr:hover{background:#f8fafc}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-active{background:#dcfce7;color:#16a34a}
.badge-completed{background:#e0e7ff;color:#6366f1}
.badge-expired{background:#fef2f2;color:#ef4444}
.module-tag{font-size:10px;padding:1px 6px;border-radius:4px}
.m-onboarding{background:#eef2ff;color:#6366f1}
.m-mentorship{background:#ecfdf5;color:#10b981}
.m-intensive{background:#fffbeb;color:#f59e0b}
.m-leadership{background:#f5f3ff;color:#8b5cf6}
.progress-text{font-size:11px;color:#94a3b8}
.status-msg{padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:10px;display:none}
.status-msg.success{display:block;background:#dcfce7;color:#16a34a}
.status-msg.error{display:block;background:#fef2f2;color:#ef4444}
.loading{text-align:center;padding:40px;color:#94a3b8}
.back-link{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:#6366f1;text-decoration:none;margin-bottom:12px}
</style>
</head>
<body>
<a class="back-link" href="/training-portal.html">← 返回培训门户</a>
<h1>⚙️ 培训管理</h1>

<div id="msg" class="status-msg"></div>

<div class="card">
  <h2>分配课程</h2>
  <div class="form-row">
    <select id="selUser"><option value="">选择用户...</option></select>
    <select id="selCourse"><option value="">选择课程...</option></select>
    <select id="selModule">
      <option value="onboarding">新人入学</option>
      <option value="mentorship">学分制带教</option>
      <option value="intensive">小灶培训</option>
      <option value="leadership">领导力课程</option>
    </select>
    <button class="btn btn-primary" onclick="doEnroll()">分配</button>
  </div>
</div>

<div class="card">
  <h2>已分配课程</h2>
  <div id="enrollList" class="loading">加载中...</div>
</div>

<script>
var MODULES = {onboarding:'新人入学',mentorship:'学分制带教',intensive:'小灶培训',leadership:'领导力课程'};
var USERS = [], COURSES = [];

function getToken(){var c=document.cookie.match(/(?:^|;\s*)token=([^;]+)/);return c?c[1]:''}
function api(url,opt){
  var h={'Content-Type':'application/json','Token':getToken()};
  return fetch(url,Object.assign({headers:h},opt||{})).then(function(r){return r.json()}).then(function(d){
    if(d.code===0||d.code===200) return d.data; throw new Error(d.message);
  });
}

function msg(text,type){var el=document.getElementById('msg');el.textContent=text;el.className='status-msg '+type;setTimeout(function(){el.className='status-msg'},3000)}

function init(){
  Promise.all([
    api('/api/shifu/shifus?page_index=1&page_size=100'),
    api('/api/shifu/admin/operations/users?page_index=1&page_size=100'),
    api('/api/portal/admin/enrollments'),
  ]).then(function(r){
    COURSES = (r[0]&&r[0].items)||[];
    USERS = (r[1]&&r[1].items)||[];
    var sUser = document.getElementById('selUser');
    USERS.forEach(function(u){sUser.innerHTML+='<option value="'+u.user_bid+'">'+(u.nickname||u.username||u.user_bid.slice(0,8))+'</option>'});
    var sCourse = document.getElementById('selCourse');
    COURSES.forEach(function(c){sCourse.innerHTML+='<option value="'+c.bid+'">'+(c.name||c.bid.slice(0,8))+'</option>'});
    renderEnrollments(r[2]||[]);
  }).catch(function(e){document.getElementById('enrollList').innerHTML='<div style="color:#ef4444">加载失败</div>'});
}

function renderEnrollments(list){
  if(!list||!list.length){document.getElementById('enrollList').innerHTML='<p style="color:#94a3b8;text-align:center;padding:20px">暂无分配记录</p>';return}
  var h='<table><tr><th>用户</th><th>课程</th><th>模块</th><th>进度</th><th>状态</th><th>操作</th></tr>';
  list.forEach(function(e){
    var user=USERS.find(function(u){return u.user_bid===e.user_bid});
    var course=COURSES.find(function(c){return c.bid===e.shifu_bid});
    var modName=MODULES[e.module]||e.module;
    var statusClass='badge-'+e.status;
    h+='<tr>'
     +  '<td>'+(user?user.nickname||user.username: e.user_bid.slice(0,8))+'</td>'
     +  '<td>'+(course?course.name: e.shifu_bid.slice(0,12))+'</td>'
     +  '<td><span class="module-tag m-'+e.module+'">'+modName+'</span></td>'
     +  '<td><span class="progress-text">'+e.progress_pct+'%</span></td>'
     +  '<td><span class="badge '+statusClass+'">'+e.status+'</span></td>'
     +  '<td><button class="btn btn-sm btn-danger" onclick="unenroll(\''+e.user_bid+'\',\''+e.shifu_bid+'\')">撤销</button></td>'
     +'</tr>';
  });
  h+='</table>';
  document.getElementById('enrollList').innerHTML=h;
}

function doEnroll(){
  var user=document.getElementById('selUser').value;
  var course=document.getElementById('selCourse').value;
  var module=document.getElementById('selModule').value;
  if(!user||!course){msg('请选择用户和课程','error');return}
  api('/api/portal/admin/enroll',{method:'POST',body:JSON.stringify({user_bid:user,shifu_bid:course,module:module})}).then(function(){
    msg('分配成功','success');
    return api('/api/portal/admin/enrollments');
  }).then(function(list){renderEnrollments(list||[])}).catch(function(e){msg(e.message,'error')});
}

function unenroll(user,course){
  if(!confirm('确认撤销此分配？'))return;
  api('/api/portal/admin/enroll',{method:'DELETE',body:JSON.stringify({user_bid:user,shifu_bid:course})}).then(function(){
    msg('已撤销','success');
    return api('/api/portal/admin/enrollments');
  }).then(function(list){renderEnrollments(list||[])}).catch(function(e){msg(e.message,'error')});
}

init();
</script>
</body>
</html>
