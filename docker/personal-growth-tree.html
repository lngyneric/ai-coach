<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人能力提升图谱 — sysmex</title>
<script src="d3.v7.min.js"></script>
<style>
:root {
  --bg: #0f172a; --bg2: #1e293b; --text: #e2e8f0; --muted: #94a3b8;
  --border: #334155; --accent: #60a5fa; --tooltip-bg: rgba(15,23,42,0.98);
  --legend-bg: rgba(15,23,42,0.9); --header-bg: rgba(15,23,42,0.96);
  --btn-bg: #1e293b; --btn-text: #94a3b8; --btn-active-bg: #2563eb;
  --gap-btn-border: #f59e0b; --gap-btn-text: #f59e0b; --gap-btn-active: #d97706;
  --node-text: #cbd5e1;
}
[data-theme="light"] {
  --bg: #f8fafc; --bg2: #e2e8f0; --text: #1e293b; --muted: #64748b;
  --border: #cbd5e1; --accent: #2563eb; --tooltip-bg: rgba(255,255,255,0.98);
  --legend-bg: rgba(255,255,255,0.95); --header-bg: rgba(248,250,252,0.96);
  --btn-bg: #e2e8f0; --btn-text: #475569; --btn-active-bg: #2563eb;
  --gap-btn-border: #d97706; --gap-btn-text: #d97706; --gap-btn-active: #d97706;
  --node-text: #334155;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;transition:background 0.3s,color 0.3s}
#header{position:fixed;top:0;left:0;right:0;height:52px;background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:100;gap:10px}
#header h1{font-size:16px;font-weight:600;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#header .sub{font-size:11px;color:var(--muted)}
#views{display:flex;gap:4px;margin-left:auto}
#views button,.ctrl,#themeBtn,#langBtn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--btn-bg);color:var(--btn-text);font-size:11px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
#views button:hover,.ctrl:hover{border-color:var(--accent);color:var(--text)}
#views button.active,.ctrl.active{background:var(--btn-active-bg);border-color:var(--btn-active-bg);color:#fff}
.ctrl.gap{border-color:var(--gap-btn-border);color:var(--gap-btn-text)}
.ctrl.gap.active{background:var(--gap-btn-active);color:#fff}
#controls{display:flex;gap:4px;margin-left:6px}
.legend{position:fixed;bottom:20px;left:20px;background:var(--legend-bg);border:1px solid var(--border);border-radius:10px;padding:14px;z-index:100;font-size:11px;max-width:220px}
.legend-item{display:flex;align-items:center;gap:6px;margin:3px 0}
.legend-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.legend-line{width:20px;height:2px;flex-shrink:0}
#tooltip{position:fixed;background:var(--tooltip-bg);border:1px solid var(--border);border-radius:12px;padding:16px 20px;max-width:420px;z-index:200;pointer-events:auto;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.5);font-size:12px;line-height:1.5}
#tooltip h3{font-size:14px;margin-bottom:4px}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;margin:2px}
.course-link{display:block;padding:6px 10px;margin:4px 0;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--accent);text-decoration:none;font-size:11px;transition:all 0.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.course-link:hover{background:var(--btn-active-bg);border-color:var(--accent);color:#fff}
.course-section{margin-top:10px;border-top:1px solid var(--border);padding-top:8px}
.course-section .label{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600}
svg{width:100%;height:100vh}
.link{fill:none}
.node circle{cursor:pointer}
.node text{font-size:10px;fill:var(--node-text);pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.5);font-weight:500}
#stats{position:fixed;top:60px;right:20px;z-index:100;font-size:10px;color:var(--muted);text-align:right;line-height:1.6}
/* Chat */
#chat-panel{
  position:fixed;bottom:0;right:20px;width:420px;max-width:100vw;height:520px;max-height:70vh;z-index:300;
  background:var(--bg);border:1px solid var(--border);border-radius:16px 16px 0 0;
  box-shadow:0 -4px 32px rgba(0,0,0,0.5);display:flex;flex-direction:column;
  transition:transform 0.3s ease;transform:translateY(100%);
}
#chat-panel.open{transform:translateY(0)}
#chat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg2);border-radius:16px 16px 0 0;cursor:pointer}
#chat-header h2{font-size:14px;margin:0;display:flex;align-items:center;gap:8px}
#chat-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;min-height:auto}
#chat-close:hover{color:var(--text)}
#chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;word-wrap:break-word}
.chat-msg.user{align-self:flex-end;background:var(--btn-active-bg);color:#fff;border-bottom-right-radius:4px}
.chat-msg.assistant{align-self:flex-start;background:var(--bg2);color:var(--text);border-bottom-left-radius:4px}
.chat-msg.system{align-self:center;background:transparent;color:var(--muted);font-size:11px;text-align:center;max-width:100%}
.chat-msg.streaming{border-left:2px solid var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
#chat-input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
#chat-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;resize:none;min-height:44px;max-height:100px;font-family:inherit}
#chat-input::placeholder{color:var(--muted)}
#chat-send{padding:10px 16px;background:var(--btn-active-bg);border:none;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;min-height:44px;white-space:nowrap}
#chat-send:disabled{opacity:0.5;cursor:not-allowed}
.stage-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin:4px 0;font-size:11px;cursor:pointer;transition:all 0.2s}
.stage-card:hover{border-color:var(--accent)}
.stage-num{display:inline-block;background:var(--btn-active-bg);color:#fff;border-radius:50%;width:20px;height:20px;text-align:center;line-height:20px;font-size:10px;margin-right:6px}
.stage-name{font-weight:600}
.stage-desc{color:var(--muted);font-size:10px;margin-top:2px}
@media (max-width:500px){#chat-panel{width:100%;right:0;height:60vh;border-radius:16px 16px 0 0}#navRole{max-width:70px}}
</style>
</head>
<body>
<div id="header">
  <img src="/logo.png" style="height:20px;width:auto;display:none" class="logo-light" alt="sysmex" />
  <h1 id="mainTitle">🧠 个人能力提升</h1>
  <span class="sub" id="subTitle">sysmex — AI时代个人成长知识体系</span><span class="sub" id="countLabel" style="margin-left:8px"></span>
  <div id="views">
    <button class="active" onclick="setView('all')" id="view-all">📋 全部</button>
    <button onclick="setView('technical')" id="view-technical">🤖 AI与技术</button>
    <button onclick="setView('product')" id="view-product">📊 产品与效能</button>
    <button onclick="setView('technical')" id="view-technical">🔬 技术</button>
    <button onclick="setView('product')" id="view-sales">👔 销售</button>

  <div id="controls">

    <button class="ctrl" onclick="resetView()">🔄 重置</button>
  </div>
  <span style="color:var(--muted);font-size:11px;margin-left:12px">|</span>
  <select id="navRole" onchange="window.switchNavRole(this.value)" style="background:var(--btn-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px;font-size:11px;min-height:30px;cursor:pointer">
    <option value="technical">🔧 技术</option>
    <option value="lab">🧑‍💻 知识工作者</option>
    <option value="lab">🔬 检验</option>
  </select>
  <button class="ctrl" onclick="window.showLearningPlan()" style="font-size:10px">📋 带教计划</button>
  <button class="ctrl" onclick="window.askGuidance()" style="font-size:10px">🎯 学习指引</button>
  <button id="langBtn" onclick="toggleLang()" title="语言">🌐</button>
  <button id="themeBtn" onclick="toggleTheme()" title="主题">☀️</button>
</div>
<div id="tooltip"></div>
<div class="legend">
  <div style="font-weight:600;margin-bottom:4px">节点</div>
  <div class="legend-item"><div class="legend-color" style="background:#22c55e"></div> 已有课程</div>
  <div class="legend-item"><div class="legend-color" style="background:#ef4444;border:2px dashed #ef4444"></div> 课程缺口</div>
  <div class="legend-item"><div class="legend-color" style="background:#f59e0b;border:2px dashed #f59e0b"></div> 优先创建</div>
  <div class="legend-item"><div class="legend-color" style="background:#f97316"></div> 销售节点</div>
  <hr style="border-color:var(--border);margin:5px 0">
  <div class="legend-item"><div class="legend-line" style="background:#3b82f6"></div> 前置</div>
  <div class="legend-item"><div class="legend-line" style="background:#a78bfa"></div> 延伸</div>
  <div class="legend-item"><div class="legend-line" style="background:#10b981"></div> 并行</div>
</div>
<div id="stats"></div>
<div id="graph"></div>
<div id="chat-panel">
  <div id="chat-header"><h2 id="chat-title">💬 AI 检验助手</h2><button id="chat-close" onclick="window.closeAIChat()">×</button></div>
  <div id="chat-messages"><div class="chat-msg system">点击知识图谱节点开始情景对话</div></div>
  <div id="chat-input-area"><textarea id="chat-input" placeholder="输入问题..." rows="1"></textarea><button id="chat-send">发送</button></div>
</div>

const W = window.innerWidth, H = window.innerHeight;

const sim = d3.forceSimulation(NODES)

const link = g.append("g").selectAll("line").data(EDGES).join("line")
  .attr("class","link")

  .attr("stroke-width",1.6)
  .attr("stroke-dasharray",function(d){return d.type==="parallel"?"5,4":"none";})
  .attr("opacity",0.45);

const node = g.append("g").selectAll("g").data(NODES).join("g")
  .attr("class","node")
  .call(d3.drag()
    .on("start",function(e,d){if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",function(e,d){d.fx=e.x;d.fy=e.y;})
    .on("end",function(e,d){if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

node.append("circle")

  .attr("stroke-dasharray",function(d){return d.has_course||d.is_sales?"none":"4,3";})

function setView(v){ currentView=v; d3.selectAll("#views button").classed("active",false); d3.select("#view-"+v).classed("active",true); applyFilters(); }
function toggleGaps(){ showGaps=!showGaps; d3.select("#gapBtn").classed("active",showGaps); applyFilters(); }
function resetView(){ svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity); showGaps=false; d3.select("#gapBtn").classed("active",false); applyFilters(); }

function applyFilters(){
  var vis=new Set();
  NODES.forEach(function(n){ var inView=currentView==="all"||(currentView==="technical"&&!n.is_sales)||(currentView==="sales"&&n.is_sales); var inGap=showGaps?!n.has_course:true; if(inView&&inGap)vis.add(n.id); });
  node.each(function(d){ var el=d3.select(this),v=vis.has(d.id); el.style("opacity",v?1:0.06); el.style("pointer-events",v?"auto":"none"); });
  link.each(function(d){ var s=d.source.id||d.source,t=d.target.id||d.target; d3.select(this).style("opacity",vis.has(s)&&vis.has(t)?0.5:0.01); });
  var vN=NODES.filter(function(n){return vis.has(n.id);});
  var tc=vN.filter(function(n){return !n.is_sales;}).length, sc=vN.filter(function(n){return n.is_sales;}).length, hc=vN.filter(function(n){return n.has_course;}).length;
  document.getElementById("stats").innerHTML="可见: "+vN.length+"节点<br>技术: "+tc+" | 销售: "+sc+"<br>有课: "+hc+" | 缺口: "+(vN.length-hc);
  document.getElementById("countLabel").textContent=vN.length+"节点 · "+hc+"门课";
}

(function(){

  var sendBtn = document.getElementById('chat-send');
  var title = document.getElementById('chat-title');

  var activeNode = null, conversation = [], isOpen = false, isStreaming = false, currentRole = 'technical';

  window.openAIChat = function(nd) {

    input.focus();
  };

  window.closeAIChat = function() { panel.classList.remove('open'); isOpen = false; };

  window.switchNavRole = function(role) {
    currentRole = role;
    if (isOpen) addMsg('system','🔄 角色: '+(role==='sales'?'销售':role==='technical'?'技术':'检验'));
  };

  window.showLearningPlan = function() {
    if (!isOpen) openDefault();
    var path = (TREE.learning_paths_detail||{})[currentRole];
    if (!path) { addMsg('assistant','暂无带教计划'); return; }
    var h = '<b>'+path.name+'</b> ('+path.total_credits+'学分)<br><br>';
    path.stages.forEach(function(s){ h += '<div class="stage-card" onclick="window.askStageGuide('+s.stage+')"><span class="stage-num">'+s.stage+'</span><span class="stage-name">'+s.name+'</span><div class="stage-desc">'+s.desc+'</div></div>'; });
    addMsg('assistant', h);
  };

  window.askStageGuide = function(n) {
    var s = ((TREE.learning_paths_detail||{})[currentRole]||{}).stages[n-1];
    if (!s) return;
    input.value = '请介绍「'+s.name+'」的学习内容。我是'+(currentRole==='sales'?'销售':currentRole==='technical'?'技术工程师':'检验技师')+'岗位。';
    sendMessage();
  };

  window.askGuidance = function() {
    if (!isOpen) openDefault();
    input.value = '我是新入职'+(currentRole==='sales'?'销售':currentRole==='technical'?'技术工程师':'检验技师')+'，请根据带教计划帮我制定学习路径。';
    sendMessage();
  };

  function openDefault() {
    activeNode = activeNode || {name:'IVD通用',domain:'检验医学',color:'#6b7280',difficulty:1,has_course:false,course_count:0,metadata:{},courses:[]};
    window.openAIChat(activeNode);
  }

  function buildPrompt(nd) {
    var m = nd.metadata||{}, p = [
      '你是希森美康 IVD 检验医学 AI 讲师。',
      '角色：'+(currentRole==='sales'?'销售(卖点/竞品/客户)':currentRole==='technical'?'技术(原理/操作/排故)':'检验(流程/判读/质控)'),
      '节点：'+nd.name+'（'+nd.domain+'）'
    ];
    if (m.instrument_models) p.push('仪器：'+m.instrument_models.join('、'));
    if (m.test_parameters) p.push('参数：'+m.test_parameters.join('、'));
    var lessons = [];
    if (nd.courses) nd.courses.forEach(function(c){ if(c.lessons) lessons=lessons.concat(c.lessons); });

    if (path) p.push('带教：'+path.name+'('+path.total_credits+'学分)');
    p.push('回答200字以内，专业易懂。');
    return p.join('\n');
  }

  function addMsg(role, text, str) {
    var d = document.createElement('div');
    d.className = 'chat-msg '+role+(str?' streaming':'');
    d.innerHTML = text.replace(/\n/g,'<br>');
    messages.appendChild(d); messages.scrollTop = messages.scrollHeight;
    return d;
  }

  async function sendMessage() {
    var text = input.value.trim();
    if (!text||isStreaming) return;
    input.value = ''; input.style.height = 'auto';
    addMsg('user', text); conversation.push({role:'user',content:text});
    sendBtn.disabled = true; isStreaming = true;
    var sd = addMsg('assistant','...',true), full = '';
    try {
      var resp = await fetch(API_BASE+'/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'mimo-v2.5',messages:conversation,stream:true,max_tokens:800})
      });
      if (!resp.ok) throw new Error('HTTP '+resp.status);
      var reader = resp.body.getReader(), decoder = new TextDecoder(), buf = '';
      while (true) {
        var r = await reader.read(); if (r.done) break;
        buf += decoder.decode(r.value,{stream:true});
        var lines = buf.split('\n'); buf = lines.pop()||'';
        for (var i=0;i<lines.length;i++) {
          var l = lines[i].trim(); if (!l.startsWith('data: ')) continue;
          try { var j = JSON.parse(l.slice(6)); var delta = j.choices?.[0]?.delta?.content;
            if (delta) { full += delta; sd.innerHTML = full.replace(/\n/g,'<br>'); messages.scrollTop = messages.scrollHeight; }
          } catch(e){}
        }
      }
      sd.classList.remove('streaming');
      if (!full) full = '(未收到回复)';
      sd.innerHTML = full.replace(/\n/g,'<br>');
      conversation.push({role:'assistant',content:full});
    } catch(e) { sd.classList.remove('streaming'); sd.innerHTML = '❌ 出错: '+e.message; }
    sendBtn.disabled = false; isStreaming = false; input.focus();
  }

  sendBtn.onclick = sendMessage;
  input.onkeydown = function(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } };
  input.oninput = function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px'; };
})();
</script>
</body>
</html>
