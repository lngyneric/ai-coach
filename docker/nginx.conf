user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    map $http_x_forwarded_proto $ai_shifu_forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }
    map $http_x_forwarded_host $ai_shifu_forwarded_host {
        default $http_x_forwarded_host;
        "" $host;
    }

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=30s;
    include /etc/nginx/conf.d/*.conf;

    # ── Port 8080: 全功能 HTTP ──
    server {
        listen 8080;

        # API
        location /api/i18n {
            proxy_pass http://ai-shifu-cook-web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location /api/config {
            proxy_pass http://ai-shifu-cook-web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location /api/ {
            rewrite ^(.*) /$1 break;
            proxy_pass http://ai-shifu-api:5800/api;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_connect_timeout 3600;
            client_max_body_size 3000m;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $ai_shifu_forwarded_proto;
            proxy_set_header X-Forwarded-Host $ai_shifu_forwarded_host;
        }
        location /api/shifu/public/ { proxy_pass http://172.18.0.1:8802; }
        location /api/training/ { proxy_pass http://172.18.0.1:8803; }

        # Static files served directly by nginx (before proxy)
        location = /ivd-knowledge-tree.html { root /usr/share/nginx/html; }
        location = /ivd-sandbox-model-docs.md { root /usr/share/nginx/html; }
        location = /ivd-sandbox-dashboard.html { root /usr/share/nginx/html; }
        location = /personal-growth-tree.html { root /usr/share/nginx/html; }
        location = /d3.v7.min.js { root /usr/share/nginx/html; }
        location = /course-entry.html { root /usr/share/nginx/html; }
        location = /sysmex-login.html { root /usr/share/nginx/html; }
        location = /sysmex-login { return 301 /sysmex-login.html; }
        location = /login { return 301 /sysmex-login.html; }

        # Course pages
        location /c/ {
            proxy_pass http://ai-shifu-cook-web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # FastClaw AI Agent Platform
        # FastClaw Next.js static assets (before / catch-all)
        location /fastclaw/ {
            proxy_pass http://172.18.0.1:18953/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        location /courses/ { proxy_pass http://172.18.0.1:8802; }
        location /training { proxy_pass http://172.18.0.1:8803; }





        # Fallback: Next.js frontend
        location / {
            proxy_pass http://ai-shifu-cook-web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── Port 443: HTTPS 外网 ──
    server {
        listen 443 ssl;
        server_name localhost 10.32.16.47 eu.sysmex.com.cn;

        ssl_certificate /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # API
        location /api/i18n { proxy_pass http://ai-shifu-cook-web:5000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Forwarded-Host $host; }
        location /api/config { proxy_pass http://ai-shifu-cook-web:5000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Forwarded-Host $host; }
        location /api/ { rewrite ^(.*) /$1 break; proxy_pass http://ai-shifu-api:5800/api; proxy_send_timeout 3600s; proxy_buffering off; proxy_read_timeout 3600s; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Forwarded-Host $host; }
        location /api/shifu/public/ { proxy_pass http://172.18.0.1:8802; }
        location /api/training/ { proxy_pass http://172.18.0.1:8803; }

        # Static files — nginx direct serve
        location = /ivd-knowledge-tree.html { root /usr/share/nginx/html; }
        location = /ivd-sandbox-model-docs.md { root /usr/share/nginx/html; }
        location = /ivd-sandbox-dashboard.html { root /usr/share/nginx/html; }
        location = /personal-growth-tree.html { root /usr/share/nginx/html; }
        location = /d3.v7.min.js { root /usr/share/nginx/html; }
        location = /course-entry.html { root /usr/share/nginx/html; }
        location = /sysmex-login.html { root /usr/share/nginx/html; }
        location = /sysmex-login { return 301 /sysmex-login.html; }
        location = /login { return 301 /sysmex-login.html; }

        # AI Chat proxy (client-side JS calls this same-origin endpoint)
        location /api/chat/ {
            proxy_pass https://api.deepseek.com/v1/;
            proxy_set_header Host api.deepseek.com;
            proxy_set_header Authorization "Bearer REPLACED_API_KEY";
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_buffering off;
            proxy_read_timeout 300s;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
        }

        # Auth redirects

        # Course pages
        location /c/ {
            proxy_pass http://ai-shifu-cook-web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # FastClaw AI Agent Platform
        # FastClaw Next.js static assets (before / catch-all)
        location /fastclaw/ {
            proxy_pass http://172.18.0.1:18953/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        location /courses/ { proxy_pass http://172.18.0.1:8802; }
        location /training { proxy_pass http://172.18.0.1:8803; }





        # Fallback: Next.js frontend
        location / {
            proxy_pass http://ai-shifu-cook-web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
