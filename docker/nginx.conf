user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    map $http_x_forwarded_proto $ai_shifu_forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }
    map $http_x_forwarded_host $ai_shifu_forwarded_host {
        default $http_x_forwarded_host;
        "" $host;
    }

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=30s;
    include /etc/nginx/conf.d/*.conf;
    # ── Multi-tenant mapping: subdomain → tenant_id ──

    # ── Multi-tenant mapping: subdomain → tenant_id ──

    # ── Multi-tenant mapping: subdomain → tenant_id ──
    map $host $fastclaw_tenant {
        hostnames;
        default               '';
        tenant-a.sysmex.com.cn 'tenant-a';
        tenant-b.sysmex.com.cn 'tenant-b';
        tenant-c.sysmex.com.cn 'tenant-c';
        localhost             '';
        10.32.16.47           '';
    }

    # ── Port 8000: Redirect to login page ──
    server {
        listen 8000;
        return 302 /login.html;
    }

    # ── Port 8080: 全功能 HTTP ──
    server {
        listen 8080;

        # API
        location /api/i18n {
            proxy_pass http://ai-shifu-cook-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location /api/config {
            proxy_pass http://ai-shifu-cook-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location /api/ {
            rewrite ^(.*) /$1 break;
            proxy_pass http://ai-shifu-api:5800/api;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_connect_timeout 3600;
            client_max_body_size 3000m;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $ai_shifu_forwarded_proto;
            proxy_set_header X-Forwarded-Host $ai_shifu_forwarded_host;
        }
        location /api/shifu/public/ { proxy_pass http://host.docker.internal:8802; }
        location /api/training/ { proxy_pass http://host.docker.internal:8803; }

        # Static files served directly by nginx (before proxy)
        location = /ivd-knowledge-tree.html { root /usr/share/nginx/html; }
        location = /ivd-sandbox-model-docs.html { root /usr/share/nginx/html; }
        location = /ivd-sandbox-dashboard.html { root /usr/share/nginx/html; }
        location = /personal-growth-tree.html { root /usr/share/nginx/html; }
        location = /d3.v7.min.js { root /usr/share/nginx/html; }
        location = /course-entry.html { root /usr/share/nginx/html; }
        location = /logout.html { root /usr/share/nginx/html; }
        location = /login.html { root /usr/share/nginx/html; }
        location = /login { rewrite ^/login$ /login.html break; root /usr/share/nginx/html; }
        location = /logout { rewrite ^/logout$ /logout.html break; root /usr/share/nginx/html; }
        location = /sysmex-login.html { root /usr/share/nginx/html; }

        # AI Chat proxy (port 8080 → Ark)
        location /api/chat/ {
            proxy_pass https://ark.cn-beijing.volces.com/api/coding/v3/;
            proxy_set_header Host ark.cn-beijing.volces.com;
            proxy_set_header Authorization "Bearer ark-c275eaf3-5344-47b4-8384-6943234217ba-fc71b";
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_buffering off;
            proxy_read_timeout 300s;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
        }

        # Course pages
        location /c/ {
            proxy_pass http://ai-shifu-cook-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # ── FastClaw AI Agent Platform ──
        # Web UI + SPA fallback
        location /fastclaw/ {
            proxy_pass http://host.docker.internal:18953/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Fastclaw-End-User $fastclaw_tenant;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # ⭐ SPA fallback: 非文件请求返回 index.html
            proxy_intercept_errors on;
            error_page 404 = /fastclaw/index.html;
        }

        # FastClaw OpenAI-compatible API
        location /v1/ {
            proxy_pass http://host.docker.internal:18953;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Fastclaw-End-User $fastclaw_tenant;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # FastClaw SSE subscribe (live agent push)
        location /api/chat/subscribe {
            proxy_pass http://host.docker.internal:18953;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Fastclaw-End-User $fastclaw_tenant;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }
        location = /courses.html { root /usr/share/nginx/html; }
        location ~ ^/courses(/.*)?$ {
            rewrite ^/courses/?$ /courses.html break;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /courses.html;
        }
        location = /mentor.html { root /usr/share/nginx/html; }
        location ~ ^/mentor(/.*)?$ {
            rewrite ^/mentor/?$ /mentor.html break;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /mentor.html;
        }
        location /training { proxy_pass http://host.docker.internal:8803; }

        # Fallback: Next.js frontend
        location / {
            proxy_pass http://ai-shifu-cook-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── Port 443: HTTPS 外网 ──
    server {
        listen 443 ssl;
        server_name localhost 10.32.16.47 eu.sysmex.com.cn;

        ssl_certificate /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # API
        location /api/i18n { proxy_pass http://ai-shifu-cook-web:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Forwarded-Host $host; }
        location /api/config { proxy_pass http://ai-shifu-cook-web:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Forwarded-Host $host; }
        location /api/ { rewrite ^(.*) /$1 break; proxy_pass http://ai-shifu-api:5800/api; proxy_send_timeout 3600s; proxy_buffering off; proxy_read_timeout 3600s; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Forwarded-Host $host; }
        location /api/shifu/public/ { proxy_pass http://host.docker.internal:8802; }
        location /api/training/ { proxy_pass http://host.docker.internal:8803; }

        # Static files — nginx direct serve
        location = /ivd-knowledge-tree.html { root /usr/share/nginx/html; }
        location = /ivd-sandbox-model-docs.html { root /usr/share/nginx/html; }
        location = /ivd-sandbox-dashboard.html { root /usr/share/nginx/html; }
        location = /personal-growth-tree.html { root /usr/share/nginx/html; }
        location = /d3.v7.min.js { root /usr/share/nginx/html; }
        location = /course-entry.html { root /usr/share/nginx/html; }
        location = /logout.html { root /usr/share/nginx/html; }
        location = /login.html { root /usr/share/nginx/html; }
        location = /login { rewrite ^/login$ /login.html break; root /usr/share/nginx/html; }
        location = /logout { rewrite ^/logout$ /logout.html break; root /usr/share/nginx/html; }
        location = /sysmex-login.html { root /usr/share/nginx/html; }

        # AI Chat proxy (client-side JS calls this same-origin endpoint)
        location /api/chat/ {
            proxy_pass https://ark.cn-beijing.volces.com/api/coding/v3/;
            proxy_set_header Host ark.cn-beijing.volces.com;
            proxy_set_header Authorization "Bearer ark-c275eaf3-5344-47b4-8384-6943234217ba-fc71b";
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_buffering off;
            proxy_read_timeout 300s;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
        }

        # Auth redirects

        # Course pages
        location /c/ {
            proxy_pass http://ai-shifu-cook-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # ── FastClaw AI Agent Platform ──
        # Web UI + SPA fallback
        location /fastclaw/ {
            proxy_pass http://host.docker.internal:18953/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Fastclaw-End-User $fastclaw_tenant;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # ⭐ SPA fallback: 非文件请求返回 index.html
            proxy_intercept_errors on;
            error_page 404 = /fastclaw/index.html;
        }

        # FastClaw OpenAI-compatible API
        location /v1/ {
            proxy_pass http://host.docker.internal:18953;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Fastclaw-End-User $fastclaw_tenant;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # FastClaw SSE subscribe (live agent push)
        location /api/chat/subscribe {
            proxy_pass http://host.docker.internal:18953;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Fastclaw-End-User $fastclaw_tenant;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }
        location = /courses.html { root /usr/share/nginx/html; }
        location ~ ^/courses(/.*)?$ {
            rewrite ^/courses/?$ /courses.html break;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /courses.html;
        }
        location = /mentor.html { root /usr/share/nginx/html; }
        location ~ ^/mentor(/.*)?$ {
            rewrite ^/mentor/?$ /mentor.html break;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /mentor.html;
        }
        location /training { proxy_pass http://host.docker.internal:8803; }

        # Fallback: Redirect to login page
        location / {
            return 302 /login.html;
        }
    }
}
