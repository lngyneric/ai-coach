<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>sysmex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8ecf4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      margin: 20px;
      padding: 40px 32px;
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 26px; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; }
    .logo p { font-size: 14px; color: #64748b; margin-top: 6px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 14px; font-weight: 500; color: #334155; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 15px; color: #0f172a; background: #f8fafc; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: #fff; }
    .btn {
      width: 100%; padding: 13px; background: #2563eb; color: #fff; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
      margin-top: 4px; transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .error {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      padding: 12px 14px; border-radius: 10px; font-size: 14px;
      margin-bottom: 20px; display: none;
    }
    .spinner { display: none; text-align: center; padding: 16px; color: #64748b; font-size: 14px; }
    .divider {
      display: flex; align-items: center; margin: 24px 0; color: #94a3b8; font-size: 13px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
    .divider span { padding: 0 12px; }
    .alt-login { text-align: center; }
    .alt-login a { color: #2563eb; text-decoration: none; font-size: 14px; }
    .alt-login a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>sysmex</h1>
      <p>Enterprise Learning Platform</p>
    </div>
    <div id="errorBox" class="error"></div>
    <form id="loginForm">
      <div class="field">
        <label for="employeeNo">Employee Number</label>
        <input type="text" id="employeeNo" name="employeeNo" placeholder="e.g. sch00068" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>
    <div id="spinner" class="spinner">Authenticating…</div>
  </div>

  <script>
    (function() {
      // Detect path prefix from current URL (e.g. /HR or empty for direct access)
      var m = window.location.pathname.match(/^(\/HR|\/hr)(?=\/|$)/i);
      var bp = m ? m[1] : '';

      var url = new URL(window.location.href);
      var redirect = url.searchParams.get('redirect') || (bp ? bp + '/' : '/');

      var errorBox = document.getElementById('errorBox');
      var submitBtn = document.getElementById('submitBtn');
      var spinner = document.getElementById('spinner');

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
      }

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        errorBox.style.display = 'none';
        var employeeNo = document.getElementById('employeeNo').value.trim();
        var password = document.getElementById('password').value;
        if (!employeeNo || !password) { showError('Please enter employee number and password.'); return; }
        submitBtn.disabled = true;
        spinner.style.display = 'block';

        fetch(bp + '/api/user/login_employee', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employeeNo: employeeNo, password: password })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.code === 0) {
            var token = data.data && data.data.token;
            var userInfo = data.data && data.data.userInfo;
            if (token) {
              document.cookie = 'token=' + token + ';path=/;SameSite=Lax;max-age=86400';
              localStorage.setItem('token', JSON.stringify(token));
              localStorage.setItem('token_faked', '0');
            }
            // Role-based redirect
            var defaultHome = bp ? bp + '/' : '/';
            var target = redirect;
            if (target === defaultHome && userInfo) {
              if (userInfo.is_creator || userInfo.is_operator) {
                target = bp + '/admin';
              }
            }
            window.location.href = target;
          } else {
            showError(data.message || 'Authentication failed.');
          }
        })
        .catch(function() { showError('Network error. Please try again.'); })
        .finally(function() {
          submitBtn.disabled = false;
          spinner.style.display = 'none';
        });
      });

      document.getElementById('employeeNo').focus();
    })();
  </script>
</body>
</html>
