<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>登录 — sysmex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8ecf4 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.1);
      width: 100%; max-width: 400px; padding: 40px 32px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo .icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #fff; display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 22px; margin-bottom: 12px;
    }
    .logo h1 { font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: -0.3px; }
    .logo p { font-size: 14px; color: #64748b; margin-top: 4px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 14px; font-weight: 500; color: #334155; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 15px; color: #0f172a; background: #f8fafc; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: #fff; }
    .btn {
      width: 100%; padding: 13px; background: #2563eb; color: #fff; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
      margin-top: 4px; transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .error {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      padding: 12px 14px; border-radius: 10px; font-size: 14px;
      margin-bottom: 20px; display: none;
    }
    .spinner { display: none; text-align: center; padding: 16px; color: #64748b; font-size: 14px; }
    .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo" style="text-align:center;margin-bottom:28px">
      <img src="/logo.png" style="height:48px;width:auto;margin-bottom:12px" alt="sysmex" />
      <h1 style="font-size:22px;font-weight:700;color:#0f172a">sysmex</h1>
      <p style="font-size:14px;color:#64748b;margin-top:4px">Enterprise Learning Platform</p>
    </div>
    <div id="errorBox" class="error"></div>
    <form id="loginForm">
      <div class="field">
        <label for="employeeNo">Employee Number</label>
        <input type="text" id="employeeNo" name="employeeNo" placeholder="e.g. sch00068" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>
    <div id="spinner" class="spinner">Authenticating…</div>
    <div class="footer">© 2026 sysmex · 企业学习平台</div>
  </div>

  <script>
    (function() {
      var url = new URL(window.location.href);
      var redirectUrl = url.searchParams.get('redirect') || '';

      // If already logged in, redirect immediately
      var tokenMatch = document.cookie.match(new RegExp('(^| )token=([^;]+)'));
      if (tokenMatch) {
        window.location.href = redirectUrl || '/courses/';
        return;
      }

      var errorBox = document.getElementById('errorBox');
      var submitBtn = document.getElementById('submitBtn');
      var spinner = document.getElementById('spinner');

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
      }

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        errorBox.style.display = 'none';
        var employeeNo = document.getElementById('employeeNo').value.trim();
        var password = document.getElementById('password').value;
        if (!employeeNo || !password) { showError('Please enter employee number and password.'); return; }
        submitBtn.disabled = true;
        spinner.style.display = 'block';

        fetch('/api/user/login_employee', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employeeNo: employeeNo, password: password })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.code === 0) {
            var token = data.data && data.data.token;
            if (token) {
              document.cookie = 'token=' + token + ';path=/;SameSite=Lax;max-age=86400';
              localStorage.setItem('token', JSON.stringify(token));
              localStorage.setItem('token_faked', '0');
            }
            // Redirect: 1) explicit redirect param, 2) admin if creator, 3) courses
            var target = redirectUrl || '/courses/';
            window.location.href = target;
          } else {
            showError(data.message || 'Authentication failed.');
          }
        })
        .catch(function() { showError('Network error. Please try again.'); })
        .finally(function() {
          submitBtn.disabled = false;
          spinner.style.display = 'none';
        });
      });

      document.getElementById('employeeNo').focus();
    })();
  </script>
</body>
</html>
