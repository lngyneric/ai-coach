global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ai-shifu-api
    metrics_path: /internal/metrics
    static_configs:
      - targets:
          - ai-shifu-api-dev:5800
  - job_name: otel-collector
    static_configs:
      - targets:
          - ai-shifu-otel-collector:13133
