<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>sysmex Learning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 380px;
      margin: 16px;
      padding: 32px 24px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 22px; font-weight: 600; color: #1e293b; }
    .logo p { font-size: 13px; color: #64748b; margin-top: 4px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #334155; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 15px; color: #1e293b; background: #f9fafb; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #2563eb; background: #fff; }
    .btn {
      width: 100%; padding: 11px; background: #2563eb; color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer;
      margin-top: 8px; transition: background 0.15s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .error {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      padding: 10px 12px; border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .spinner { display: none; text-align: center; padding: 16px; color: #64748b; font-size: 14px; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .loader {
      width: 36px; height: 36px; border: 3px solid #e5e7eb;
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root" class="loading">
    <div class="loader"></div>
  </div>

  <script>
    (function() {
      var url = new URL(window.location.href);
      var parts = url.pathname.split('/');
      var courseId = parts[parts.length - 1] || '';
      var lessonId = url.searchParams.get('lessonid') || '';

      function getCookie(name) {
        var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
      }

      function buildCourseUrl() {
        var href = '/c/' + courseId;
        if (lessonId) href += '?lessonid=' + encodeURIComponent(lessonId);
        return href;
      }

      function showLogin() {
        document.getElementById('root').innerHTML =
          '<div class="card">' +
            '<div class="logo"><h1>sysmex</h1><p>Employee Learning Platform</p></div>' +
            '<div id="errorBox" class="error"></div>' +
            '<form id="loginForm">' +
              '<div class="field">' +
                '<label for="employeeNo">Employee Number</label>' +
                '<input type="text" id="employeeNo" name="employeeNo" placeholder="e.g. sch0000" autocomplete="username" required />' +
              '</div>' +
              '<div class="field">' +
                '<label for="password">Password</label>' +
                '<input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required />' +
              '</div>' +
              '<button type="submit" class="btn" id="submitBtn">Sign In</button>' +
            '</form>' +
            '<div id="spinner" class="spinner">Authenticating…</div>' +
          '</div>';

        var errorBox = document.getElementById('errorBox');
        var submitBtn = document.getElementById('submitBtn');
        var spinnerEl = document.getElementById('spinner');

        function showError(msg) {
          errorBox.textContent = msg;
          errorBox.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
          e.preventDefault();
          errorBox.style.display = 'none';
          var employeeNo = document.getElementById('employeeNo').value.trim();
          var password = document.getElementById('password').value;
          if (!employeeNo || !password) { showError('Please enter employee number and password.'); return; }
          submitBtn.disabled = true;
          spinnerEl.style.display = 'block';

          fetch('/api/user/login_employee', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ employeeNo: employeeNo, password: password })
          })
          .then(function(res) { return res.json(); })
          .then(function(data) {
            if (data.code === 0) {
              var token = data.data && data.data.token;
              if (token) {
                document.cookie = 'token=' + token + ';path=/;SameSite=Lax;max-age=86400';
                localStorage.setItem('token', JSON.stringify(token));
                localStorage.setItem('token_faked', '0');
              }
              window.location.href = buildCourseUrl();
            } else {
              showError(data.message || 'Authentication failed.');
            }
          })
          .catch(function() { showError('Network error. Please try again.'); })
          .finally(function() {
            submitBtn.disabled = false;
            spinnerEl.style.display = 'none';
          });
        });

        document.getElementById('employeeNo').focus();
      }

      // Check if already authenticated — redirect directly
      var token = getCookie('token');
      if (token) {
        window.location.href = buildCourseUrl();
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
