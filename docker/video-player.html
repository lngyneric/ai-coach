<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>视频学习 - sysmex</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
/* ── Top Bar ── */
.topbar{background:rgba(15,23,42,.95);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.06);padding:8px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar .back{background:none;border:none;color:#94a3b8;font-size:14px;cursor:pointer;padding:4px 10px;border-radius:6px;transition:all .15s}
.topbar .back:hover{color:#fff;background:rgba(255,255,255,.08)}
.topbar .title{font-size:14px;font-weight:500;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.topbar .lesson-nav{display:flex;align-items:center;gap:6px}
.topbar .lesson-nav button{background:rgba(255,255,255,.06);border:none;color:#94a3b8;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s}
.topbar .lesson-nav button:hover{background:rgba(255,255,255,.12);color:#fff}
.topbar .lesson-nav span{font-size:12px;color:#64748b}
/* ── Video Container (floating) ── */
.video-section{position:relative;background:#000;overflow:hidden;transition:all .3s ease}
.video-section.expanded{height:auto}
.video-section.collapsed{height:80px}
video{width:100%;display:block;outline:none;max-height:70vh;background:#000;margin:0 auto}
.video-controls{position:absolute;bottom:8px;right:8px;z-index:10;display:flex;gap:4px}
.video-controls button{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;backdrop-filter:blur(4px)}
.video-controls button:hover{background:rgba(0,0,0,.8)}
/* ── Main Content Area ── */
.content-area{max-width:960px;margin:0 auto;padding:20px 16px}
.content-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:16px}
.content-card h3{font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.content-card h3 .badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;background:rgba(99,102,241,.15);color:#818cf8}
/* ── Subtitle / Transcript ── */
.transcript-text{font-size:14px;line-height:1.8;color:#cbd5e1;max-height:400px;overflow-y:auto}
.transcript-text .cue{padding:8px 12px;border-radius:6px;cursor:pointer;transition:all .1s;border-left:2px solid transparent;margin-bottom:2px}
.transcript-text .cue:hover{background:rgba(255,255,255,.04)}
.transcript-text .cue.active{background:rgba(99,102,241,.12);border-left-color:#818cf8;color:#fff}
.transcript-text .cue .time{font-size:11px;color:#64748b;margin-right:8px}
/* ── Q&A Input ── */
.qa-area{margin-top:16px}
.qa-input-wrap{display:flex;gap:8px}
.qa-input-wrap input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#e2e8f0;font-size:14px;outline:none;transition:border .2s}
.qa-input-wrap input:focus{border-color:#818cf8}
.qa-input-wrap input::placeholder{color:#475569}
.qa-input-wrap button{padding:10px 20px;border-radius:8px;border:none;background:#6366f1;color:#fff;font-size:14px;cursor:pointer;transition:background .15s;white-space:nowrap}
.qa-input-wrap button:hover{background:#4f46e5}
.qa-input-wrap button:disabled{opacity:.5;cursor:not-allowed}
.qa-messages{margin-top:12px;max-height:300px;overflow-y:auto}
.qa-msg{padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:14px;line-height:1.5}
.qa-msg.user{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.15)}
.qa-msg.assistant{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.qa-msg .role{font-size:11px;color:#64748b;margin-bottom:4px}
/* ── Loading ── */
.loading-overlay{position:fixed;inset:0;background:#0f172a;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.08);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay span{color:#64748b;font-size:14px}
.error-overlay{position:fixed;inset:0;background:#0f172a;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;text-align:center;display:none}
.error-overlay p{color:#94a3b8;font-size:15px;line-height:1.5}
.error-overlay button{margin-top:8px;padding:8px 20px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#e2e8f0;font-size:14px;cursor:pointer;transition:background .15s}
.error-overlay button:hover{background:rgba(255,255,255,.1)}
/* ── Responsive ── */
@media(max-width:640px){
  .topbar .title{font-size:13px}
  .video-section.expanded video{max-height:55vh}
  .content-area{padding:12px}
}

    /* ═══ Unified Navbar ═══ */
    .topnav {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e2e8f0;
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; height: 56px; padding: 0 16px;
    }
    .topnav-logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; color: #1e293b; margin-right: 16px; flex-shrink: 0; }
    .topnav-logo img { height: 20px; width: auto; }
    .topnav-links { display: flex; gap: 2px; flex: 1; overflow-x: auto; }
    .topnav-link { padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #64748b; text-decoration: none; white-space: nowrap; transition: all .15s; }
    .topnav-link:hover { background: #f1f5f9; color: #1e293b; }
    .topnav-link.active { background: #eff6ff; color: #2563eb; }
    .topnav-user { display: flex; align-items: center; gap: 8px; flex-shrink: 0; font-size: 13px; color: #64748b; }
    .topnav-avatar { width: 28px; height: 28px; border-radius: 50%; background: #dbeafe; color: #2563eb; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
    .topnav-logout { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 12px; padding: 4px 8px; border-radius: 6px; }
    .topnav-logout:hover { color: #ef4444; }
    body.dark .topnav { background: rgba(15,23,42,.92); border-bottom-color: #1e293b; }
    body.dark .topnav-logo { color: #e2e8f0; }
    body.dark .topnav-link { color: #94a3b8; }
    body.dark .topnav-link:hover { background: #1e293b; color: #e2e8f0; }
    body.dark .topnav-link.active { background: #1e3a5f; color: #60a5fa; }
    body.dark .topnav-user { color: #94a3b8; }
    body.dark .topnav-avatar { background: #1e3a5f; color: #60a5fa; }

</style>

<body>
<!-- ═══ Unified Navbar ═══ -->
<div class="topnav" id="appNavbar">
  <div class="topnav-logo"><img src="/logo.png" alt="sysmex" />sysmex</div>
  <div class="topnav-links">
    <a class="topnav-link" href="/courses/">📖 课程</a>
    <a class="topnav-link" href="/ivd-knowledge-tree.html">🧠 知识图谱</a>
    <a class="topnav-link" href="/ivd-sandbox-dashboard.html">🎮 沙盘推演</a>
    <a class="topnav-link" href="/personal-growth-tree.html">🌱 个人成长</a>
    <a class="topnav-link" href="/training-portal.html">🎯 培训门户</a>
    <a class="topnav-link" href="/coach">🧑‍🏫 导师工作台</a>
  </div>
  <div class="topnav-user" id="navUser">
    <span id="navUserName">加载中...</span>
    <span class="topnav-avatar" id="navAvatar">?</span>

  </div>
</div>


<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <span>加载课程...</span>
</div>

<!-- Error -->
<div class="error-overlay" id="error">
  <p id="errorMsg">加载失败</p>
  <button onclick="location.reload()">重试</button>
</div>

<!-- Top Bar -->
<div class="topbar">
  <button class="back" onclick="window.location.href=document.referrer||'/courses'">←</button>
  <div class="title" id="courseTitle">视频课程</div>
  <div class="lesson-nav" id="lessonNav">
    <button onclick="prevLesson()" id="prevBtn">‹ 上一节</button>
    <span id="lessonIdx">0/0</span>
    <button onclick="nextLesson()" id="nextBtn">下一节 ›</button>
    <button onclick="restudyCourse()" id="restudyBtn" style="background:rgba(239,68,68,.12);color:#f87171;border:none;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer">↻ 重修</button>
  </div>
</div>

<!-- Video Section (floating) -->
<div class="video-section expanded" id="videoSection">
  <video id="videoPlayer" controls playsinline preload="metadata"></video>
  <div class="video-controls">
    <button onclick="toggleVideoSize()" id="videoToggleBtn">━ 收起</button>
  </div>
</div>

<!-- Content Area -->
<div class="content-area">
  <!-- Transcript placeholder -->
  <div class="content-card" id="transcriptCard">
    <h3>📝 课程内容 <span class="badge">即将支持字幕同步</span></h3>
    <div class="transcript-text" id="transcriptText">
      <p style="color:#64748b;text-align:center;padding:20px 0">加载课程内容...</p>
    </div>
  </div>

  <!-- Q&A -->
  <div class="content-card">
    <h3>💬 向课程提问</h3>
    <div class="qa-area">
      <div class="qa-input-wrap">
        <input type="text" id="qaInput" placeholder="输入关于视频内容的问题..." onkeydown="if(event.key==='Enter')askQuestion()">
        <button onclick="askQuestion()" id="qaBtn">提问</button>
      </div>
      <div class="qa-messages" id="qaMessages"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════
var BID = qs('bid');
var TOKEN = '';
var LESSONS = [];
var CURRENT = 0;
var VIDEO_COLLAPSED = false;
var HLS_INSTANCE = null;

function qs(k){ var m=location.search.match(new RegExp('[?&]'+k+'=([^&]*)')); return m?decodeURIComponent(m[1]):''; }
function getToken(){
  var c=document.cookie.match(/(?:^| )token=([^;]*)/);
  return c?c[1]:(localStorage.getItem('token')||'');
}

function api(m,u,b){
  var h={'Content-Type':'application/json'};
  if(TOKEN){ h['Token']=TOKEN; h['Authorization']='Bearer '+TOKEN; }
  return fetch(u,{method:m||'GET',headers:h,body:b?JSON.stringify(b):null}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(j){
    if(j.code!==0&&j.code!==void 0) throw new Error(j.message||j.msg||'API error');
    return j.data||j;
  });
}

// ═══════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════
function init(){
  if(!BID){ showError('缺少课程 ID'); return; }
  TOKEN = getToken();
  if(!TOKEN){ window.location.href='/login?redirect=/video-player.html?bid='+BID; return; }

  showLoading();
  // Get course info + outline tree
  api('GET','/api/learn/shifu/'+BID+'/outline-item-tree?preview_mode=false').then(function(tree){
    var items = tree.outline_items || [];
    if(!items.length) throw new Error('课程暂无内容');
    var promises = [];
    for(var ci=0;ci<items.length;ci++){
      var children = items[ci].children||[];
      for(var li=0;li<children.length;li++){
        var ls = children[li];
        if(!ls.bid) continue;
        promises.push(
          api('GET','/api/shifu/shifus/'+BID+'/outlines/'+ls.bid+'/mdflow').then((function(l){
            return function(md){
              var c = typeof md==='string'?md:(md&&md.data)?md.data:(md&&md.content)||md||'';
              var m1 = c.match(/^\{\{video\}\}\s*\n\s*(\S+)/im);
              var m2 = c.match(/\[video\]([^\[]+)\[\/video\]/);
              var m3 = c.match(/source\s*=\s*"([^"]+)"/);
              return { bid:l.bid, title:l.name||'视频课时', url:m1?m1[1]:(m2?m2[1]:(m3?m3[1]:'')), mdflow:c };
            };
          })(ls))
        );
      }
    }
    return Promise.all(promises).then(function(r){ return r.filter(function(x){ return x.url; }); });
  }).then(function(lessons){
    if(!lessons.length) throw new Error('未找到视频内容');
    LESSONS = lessons;
    document.getElementById('courseTitle').textContent = lessons[0].title;
    playLesson(0);
    renderTranscript(0);
    hideLoading();
  }).catch(function(e){ showError(e.message||'加载失败'); });
}

// ═══════════════════════════════════════════════
// Playback
// ═══════════════════════════════════════════════
function playLesson(idx){
  if(idx<0||idx>=LESSONS.length) return;
  CURRENT = idx;
  var ls = LESSONS[idx];
  document.getElementById('courseTitle').textContent = ls.title;
  document.getElementById('lessonIdx').textContent = (idx+1)+'/'+LESSONS.length;
  document.getElementById('prevBtn').style.display = idx>0?'':'none';
  document.getElementById('nextBtn').style.display = idx<LESSONS.length-1?'':'none';

  var v = document.getElementById('videoPlayer');
  v.removeAttribute('src');
  if(HLS_INSTANCE){ HLS_INSTANCE.destroy(); HLS_INSTANCE=null; }
  v.load();

  var src = ls.url;
  if(!src.match(/\.m3u8/i)){ v.src=src; v.play().catch(function(){}); return; }
  if(v.canPlayType('application/vnd.apple.mpegurl')){ v.src=src; v.play().catch(function(){}); return; }
  loadHlsJs(src, v);
}

function loadHlsJs(src, v){
  if(window.Hls){ startHls(src,v); return; }
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js';
  s.onload=function(){ startHls(src,v); };
  s.onerror=function(){ v.src=src; v.play().catch(function(){}); };
  document.body.appendChild(s);
}

function startHls(src, v){
  if(HLS_INSTANCE) HLS_INSTANCE.destroy();
  var Hls=window.Hls;
  if(Hls&&Hls.isSupported()){
    var h=new Hls(); HLS_INSTANCE=h;
    h.loadSource(src); h.attachMedia(v);
    h.on(Hls.Events.MANIFEST_PARSED,function(){ v.play().catch(function(){}); });
    h.on(Hls.Events.ERROR,function(e,d){ if(d.fatal){ h.destroy(); showError('播放错误'); }});
  } else { v.src=src; v.play().catch(function(){}); }
}

function prevLesson(){ playLesson(CURRENT-1); renderTranscript(CURRENT); }
function nextLesson(){ playLesson(CURRENT+1); renderTranscript(CURRENT); }

// ═══════════════════════════════════════════════
// Video Float Toggle
// ═══════════════════════════════════════════════
function toggleVideoSize(){
  VIDEO_COLLAPSED = !VIDEO_COLLAPSED;
  var sec = document.getElementById('videoSection');
  var btn = document.getElementById('videoToggleBtn');
  if(VIDEO_COLLAPSED){
    sec.className='video-section collapsed';
    btn.textContent='□ 展开';
  } else {
    sec.className='video-section expanded';
    btn.textContent='━ 收起';
  }
}

// ═══════════════════════════════════════════════
// Transcript
// ═══════════════════════════════════════════════
function renderTranscript(idx){
  var ls = LESSONS[idx];
  if(!ls||!ls.mdflow){ return; }
  var el = document.getElementById('transcriptText');
  var md = ls.mdflow;
  // Remove {{video}} line
  var text = md.replace(/^\{\{video\}\}\s*\n\s*\S+\s*/im,'').trim();
  // Markdown→simple HTML
  var html = text
    .replace(/^###\s+(.*)$/gm,'<h3 style="font-size:15px;font-weight:600;color:#e2e8f0;margin:16px 0 8px">$1</h3>')
    .replace(/^##\s+(.*)$/gm,'<h2 style="font-size:16px;font-weight:600;color:#f1f5f9;margin:20px 0 10px">$1</h2>')
    .replace(/^#\s+(.*)$/gm,'<h1 style="font-size:18px;font-weight:700;color:#f8fafc;margin:24px 0 12px">$1</h1>')
    .replace(/^---\s*$/gm,'<hr style="border:none;border-top:1px solid rgba(255,255,255,.06);margin:16px 0">')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n\n/g,'</p><p style="margin-bottom:12px;line-height:1.8">')
    .replace(/\n/g,'<br>');
  el.innerHTML = '<p style="margin-bottom:12px;line-height:1.8">'+html+'</p>';
  if(!text) el.innerHTML = '<p style="color:#64748b;text-align:center;padding:20px 0">此课程暂无文字内容</p>';
  // Future: parse subtitle cues here
}

// ═══════════════════════════════════════════════
// Q&A (AI Questioning)
// ═══════════════════════════════════════════════
var QA_HISTORY = [];
function askQuestion(){
  var input = document.getElementById('qaInput');
  var q = input.value.trim();
  if(!q) return;
  input.value = '';
  addQAMsg('user',q);
  document.getElementById('qaBtn').disabled = true;
  // Build conversation context
  var ls = LESSONS[CURRENT];
  var context = '关于课程「'+(ls?ls.title:'')+'」的问题：\n\n';
  if(ls&&ls.mdflow){ context += '课程内容摘要：'+ls.mdflow.replace(/^\{\{video\}\}\s*\n\s*\S+/im,'').substring(0,500)+'\n\n'; }
  var messages = [{'role':'system','content':'你是课程助教，回答关于视频内容的问题。回答简洁有条理，用中文。'}];
  QA_HISTORY.forEach(function(m){ messages.push(m); });
  messages.push({'role':'user','content':context+q});

  // Call OpenAI-compatible API through the nginx proxy
  fetch('/api/chat/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'mimo-v2.5',messages:messages,stream:false,max_tokens:1000})
  }).then(function(r){ return r.json(); }).then(function(d){
    var answer = (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'抱歉，暂时无法回答';
    QA_HISTORY.push({role:'user',content:q});
    QA_HISTORY.push({role:'assistant',content:answer});
    addQAMsg('assistant',answer);
  }).catch(function(e){
    addQAMsg('assistant','回答失败：'+e.message);
  }).finally(function(){
    document.getElementById('qaBtn').disabled = false;
  });
}

function addQAMsg(role, content){
  var el = document.getElementById('qaMessages');
  var d = document.createElement('div');
  d.className = 'qa-msg '+role;
  d.innerHTML = '<div class="role">'+(role==='user'?'🧑 你':'🤖 助教')+'</div>'+content;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// ═══════════════════════════════════════════════
// UI Helpers
// ═══════════════════════════════════════════════
function showLoading(){ document.getElementById('loading').style.display='flex'; }
function hideLoading(){ document.getElementById('loading').style.display='none'; }
function showError(m){ document.getElementById('errorMsg').textContent=m||'加载失败'; document.getElementById('error').style.display='flex'; hideLoading(); }

// ═══════════════════════════════════════════════
// Restudy
// ═══════════════════════════════════════════════
function restudyCourse(){
  if(!confirm('确定重修此课程吗？当前进度将重置。')) return;
  var bid = getQueryParam('bid');
  if(!bid){ showError('缺少课程 ID'); return; }
  var tok = getToken();
  if(!tok){ showError('请先登录'); return; }
  showLoading();
  fetch('/api/admin/learn/restudy/' + bid, {
    method: 'POST', headers: { 'Token': tok, 'Content-Type': 'application/json' }
  }).then(function(r){ return r.json(); }).then(function(d){
    if(d.code === 0){
      // Reset progress in URL, reload page
      progressPct = 0; completedLessons = {}; saveProgress();
      setTimeout(function(){ window.location.reload(); }, 500);
    } else { showError(d.message || '重置失败'); hideLoading(); }
  }).catch(function(e){ showError('网络错误'); hideLoading(); });
}

// ═══════════════════════════════════════════════
// Start
// ═══════════════════════════════════════════════
init();
</script>

<script>
(function() {
  var path = window.location.pathname;
  document.querySelectorAll('.topnav-link').forEach(function(a) {
    if (path === a.getAttribute('href')) a.classList.add('active');
  });
  fetch('/api/user/info').then(function(r){return r.json()}).then(function(d){
    if (d.code === 0) {
      var u = d.data;
      var navName = document.getElementById('navUserName');
      var navAvatar = document.getElementById('navAvatar');
      if (navName) navName.textContent = u.name || u.user_id || '用户';
      if (navAvatar) navAvatar.textContent = (u.name || u.user_id || '?')[0];
    }
  }).catch(function(){});
})();
</script>
</body>
</html>
