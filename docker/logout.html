<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>已登出 - sysmex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 100%);
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(226,232,240,.8);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,.06);
      animation: fadeUp .5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrapper {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #dbeafe, #e0e7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }

    .card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .card .hint {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid #f1f5f9;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all .15s;
      text-decoration: none;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover {
      background: #1d4ed8;
      box-shadow: 0 4px 16px rgba(37,99,235,.25);
    }

    .btn-secondary {
      background: #fff;
      color: #475569;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo .badge {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }
    .logo span {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
    }

    .checkmark-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #ecfdf5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .checkmark {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #10b981;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logo.png" style="height:28px;width:auto" alt="sysmex" />
      <span>sysmex Learning</span>
    </div>

    <div class="checkmark-ring">
      <div class="checkmark">✓</div>
    </div>

    <h1>已安全登出</h1>
    <p>
      你已成功退出登录，账号安全已保护。<br>
      如需继续学习，请重新登录。
    </p>

    <div class="hint">
      💡 为保护账号安全，使用公共电脑时请关闭浏览器窗口
    </div>

    <div class="btn-group">
      <a href="/login?redirect=/courses/" class="btn btn-primary">
        重新登录
      </a>
      <a href="/courses/" class="btn btn-secondary">
        返回课程首页
      </a>
    </div>
  </div>

  <div class="footer">
    © 2026 sysmex · 企业学习平台
  </div>

  <script>
    // Clear all auth tokens immediately (redundant with cookie clear, but thorough)
    (function() {
      // 1. Clear the token cookie
      document.cookie = 'token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax';
      
      // 2. Clear localStorage tokens
      try {
        localStorage.removeItem('token');
        localStorage.removeItem('token_faked');
        localStorage.removeItem('user_info');
        sessionStorage.clear();
      } catch(e) { /* ignore */ }

      // 3. Also try calling the backend logout API (optional, best-effort)
      try {
        fetch('/api/user/logout', { method: 'POST', keepalive: true }).catch(function(){});
      } catch(e) { /* ignore */ }
    })();
  </script>
</body>
</html>
